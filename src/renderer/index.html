    <style>
      /* ── Preloader ── */
      #preloader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #0b0f1a;
        z-index: 99999;
      }
      .preloader-center {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 120px;
        height: 120px;
      }
      .ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top: 2px solid #ff2d7a;
        border-right: 2px solid #7b5cf0;
        border-bottom: 2px solid #00d4ff;
        animation: preloader-spin 1.2s linear infinite;
      }
      .glow {
        position: absolute;
        inset: 20%;
        border-radius: 50%;
        background: radial-gradient(circle, #7b5cf0, transparent);
        filter: blur(16px);
        opacity: 0.7;
        animation: preloader-pulse 2s ease-in-out infinite;
      }
      .logo {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        color: white;
        font-size: 16px;
        letter-spacing: 2px;
      }
      @keyframes preloader-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes preloader-pulse {
        0%,
        100% {
          transform: scale(0.9);
          opacity: 0.5;
        }
        50% {
          transform: scale(1.2);
          opacity: 1;
        }
      }

      [data-theme="light"] #preloader {
        background: #f6f7f9;
      }
      [data-theme="light"] .logo {
        color: #1e2535;
      }

      /* ── Titlebar overrides ── */
      .titlebar {
        height: 48px !important;
        padding: 0 12px 0 16px !important;
        gap: 6px !important;
        justify-content: flex-start !important;
      }

      /* Left: app icon + name */
      .titlebar-left {
        flex-shrink: 0;
        margin-right: 10px;
      }

      /* Center: user info — sits inline, not centered */
      #top-bar-center {
        flex: 0 0 auto;
        display: none;
        align-items: center;
        gap: 8px;
        -webkit-app-region: no-drag;
        pointer-events: auto;
        margin-right: 6px;
      }
      #top-bar-center.visible {
        display: flex;
      }

      #top-bar-avatar {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: linear-gradient(135deg, #4f8ef7, #7c6af7);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 9px;
        font-weight: 800;
        color: #fff;
        flex-shrink: 0;
        pointer-events: auto;
      }
      #top-bar-info {
        display: flex;
        flex-direction: column;
        gap: 1px;
        pointer-events: auto;
      }
      #top-bar-name {
        font-size: 11px;
        font-weight: 700;
        color: var(--text);
        line-height: 1.15;
      }
      #top-bar-days {
        font-size: 10px;
        color: var(--text2);
        line-height: 1.15;
      }
      #top-bar-days.warn {
        color: #ffc94d;
      }

      /* Spacer pushes window controls to the right */
      .titlebar-spacer {
        flex: 1;
        -webkit-app-region: drag;
      }

      /* Right: toggles + window controls — now just trailing items */
      .titlebar-right {
        display: contents;
      }

      .titlebar-divider {
        width: 1px;
        height: 18px;
        background: var(--border);
        margin: 0 6px;
        flex-shrink: 0;
      }

      /* ── Lang toggle (pill) ── */
      .tb-lang-switch {
        position: relative;
        display: inline-flex;
        align-items: center;
        margin: 0 4px;
        -webkit-app-region: no-drag;
      }
      .tb-lang-switch > span {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        pointer-events: none;
        font-family: "Segoe UI", Arial, sans-serif;
        font-weight: 700;
        font-size: 11px;
        text-transform: uppercase;
        width: 50%;
        text-align: center;
        line-height: 1;
      }
      .check-toggle {
        position: absolute;
        margin-left: -9999px;
        visibility: hidden;
      }
      .check-toggle + label {
        display: block;
        position: relative;
        cursor: pointer;
        outline: none;
        user-select: none;
      }
      .check-toggle-round-flat + label {
        padding: 2px;
        width: 74px;
        height: 28px;
        background-color: var(--accent);
        border-radius: 60px;
        transition: background 0.2s;
      }
      .check-toggle-round-flat + label:before,
      .check-toggle-round-flat + label:after {
        display: block;
        position: absolute;
        content: "";
      }
      .check-toggle-round-flat + label:before {
        top: 2px;
        left: 2px;
        bottom: 2px;
        right: 2px;
        background-color: var(--accent);
        border-radius: 60px;
        transition: background 0.2s;
      }
      .check-toggle-round-flat + label:after {
        top: 3px;
        left: 3px;
        bottom: 3px;
        width: 36px;
        background-color: #fff;
        border-radius: 52px;
        transition: margin 0.2s;
      }
      .check-toggle-round-flat:checked + label {
        background-color: var(--accent2);
      }
      .check-toggle-round-flat:checked + label:before {
        background-color: var(--accent2);
      }
      .check-toggle-round-flat:checked + label:after {
        margin-left: 32px;
      }
      .lang-on {
        left: 0;
        padding-left: 4px;
        color: #fff;
      }
      .lang-off {
        right: 0;
        padding-right: 4px;
        color: #fff;
      }
      .check-toggle-round-flat:checked ~ .lang-off {
        opacity: 0.5;
      }
      .check-toggle-round-flat:not(:checked) ~ .lang-on {
        opacity: 0.5;
      }

      /* ── Admin Refresh button ── */
      #btn-admin-refresh {
        display: none; /* shown only after license is valid */
        align-items: center;
        justify-content: center;
        gap: 5px;
        height: 26px;
        padding: 0 10px;
        border: 1px solid rgba(124, 106, 247, 0.35);
        border-radius: 6px;
        background: rgba(124, 106, 247, 0.10);
        color: #a89cf7;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.04em;
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
        -webkit-app-region: no-drag;
        flex-shrink: 0;
        margin: 0 4px;
      }
      #btn-admin-refresh:hover {
        background: rgba(124, 106, 247, 0.22);
        border-color: rgba(124, 106, 247, 0.6);
        color: #c4b8ff;
      }
      #btn-admin-refresh:active {
        background: rgba(124, 106, 247, 0.32);
      }
      #btn-admin-refresh.refreshing {
        opacity: 0.6;
        pointer-events: none;
      }
      #btn-admin-refresh .refresh-icon {
        display: inline-block;
        transition: transform 0.6s ease;
      }
      #btn-admin-refresh.refreshing .refresh-icon {
        animation: spin-once 0.7s linear forwards;
      }
      @keyframes spin-once {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }

      /* ── Theme toggle (sun/moon switch) ── */
      .tb-theme-switch {
        font-size: 14px;
        position: relative;
        display: inline-flex;
        align-items: center;
        width: 52px;
        height: 28px;
        cursor: pointer;
        margin: 0 4px;
        -webkit-app-region: no-drag;
        flex-shrink: 0;
      }
      .tb-theme-input {
        opacity: 0;
        width: 0;
        height: 0;
        position: absolute;
      }
      .tb-theme-slider {
        position: absolute;
        inset: 0;
        background-color: #73c0fc;
        border-radius: 30px;
        transition: background 0.4s;
      }
      .tb-theme-slider:before {
        position: absolute;
        content: "";
        height: 22px;
        width: 22px;
        border-radius: 50%;
        left: 3px;
        top: 3px;
        z-index: 2;
        background-color: #e8e8e8;
        transition: transform 0.4s;
      }
      .tb-sun svg {
        position: absolute;
        top: 4px;
        right: 4px;
        z-index: 1;
        width: 18px;
        height: 18px;
        pointer-events: none;
        animation: tb-rotate 15s linear infinite;
      }
      .tb-moon svg {
        fill: #73c0fc;
        position: absolute;
        top: 4px;
        left: 4px;
        z-index: 1;
        width: 16px;
        height: 16px;
        pointer-events: none;
        animation: tb-tilt 5s linear infinite;
      }
      @keyframes tb-rotate {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      @keyframes tb-tilt {
        0% {
          transform: rotate(0deg);
        }
        25% {
          transform: rotate(-30deg);
        }
        75% {
          transform: rotate(15deg);
        }
        100% {
          transform: rotate(0deg);
        }
      }
      .tb-theme-input:checked + .tb-theme-slider {
        background-color: #183153;
      }
      .tb-theme-input:checked + .tb-theme-slider:before {
        transform: translateX(24px);
      }

      /* App sits below 48px titlebar */
      #app {
        top: 48px !important;
      }
    </style>

</head>

    <!-- ── AUTO-UPDATE TOAST ── -->
    <style>
      #updateToast {
        display: none;
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 9999;
        background: var(--bg2);
        border: 1px solid rgba(123,92,240,.45);
        border-radius: 14px;
        padding: 14px 18px;
        min-width: 260px;
        max-width: 320px;

      }
      #updateTitle { font-weight: 700; font-size: 13px; color: var(--text); }
      #updateSub   { font-size: 11px; color: var(--text2); margin-top: 1px; }
      [data-theme="light"] #updateToast { box-shadow: 0 8px 32px rgba(0,0,0,.12); }
    </style>
    <div id="updateToast">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <div style="width:32px;height:32px;border-radius:8px;background:rgba(123,92,240,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </div>
        <div>
          <div id="updateTitle">Update Available</div>
          <div id="updateSub"></div>
        </div>
        <button onclick="document.getElementById('updateToast').style.display='none'" style="margin-inline-start:auto;background:none;border:none;color:var(--text2);cursor:pointer;padding:2px;font-size:16px;line-height:1;">✕</button>
      </div>
      <!-- progress bar (hidden until download starts) -->
      <div id="updateProgressWrap" style="display:none;margin-bottom:10px;">
        <div style="background:var(--border);border-radius:99px;height:5px;overflow:hidden;">
          <div id="updateProgressBar" style="height:100%;width:0%;background:linear-gradient(90deg,#7b5cf0,#a78bfa);border-radius:99px;transition:width .3s;"></div>
        </div>
        <div id="updateProgressLabel" style="font-size:11px;color:var(--text2);margin-top:4px;text-align:end;">0%</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button id="updateActionBtn" onclick="handleUpdateAction()" style="
          flex:1;padding:8px 12px;border-radius:8px;border:none;cursor:pointer;
          background:linear-gradient(135deg,#7b5cf0,#a78bfa);color:#fff;
          font-weight:700;font-size:12px;font-family:'DM Sans',sans-serif;
        ">Download Update</button>
      </div>
    </div>

    <script>
    "use strict";
    // ════════════════════════════════════════════════════════════════
    //  AUTO-UPDATER UI
    // ════════════════════════════════════════════════════════════════
    let _updateState = 'idle'; // idle | checking | available | downloading | downloaded | error

    function _updLog(level, ...args) {
      const ts = new Date().toISOString();
      const prefix = `[AutoUpdate][${ts}]`;
      if (level === 'error') console.error(prefix, ...args);
      else if (level === 'warn')  console.warn(prefix, ...args);
      else                        console.log(prefix, ...args);
    }

    function showUpdateToast(title, sub, btnLabel, showProgress) {
      _updLog('info', `showUpdateToast → title="${title}" btn="${btnLabel}" progress=${showProgress}`);
      const toast = document.getElementById('updateToast');
      const dot   = document.getElementById('updateDot');
      document.getElementById('updateTitle').textContent = title;
      document.getElementById('updateSub').textContent   = sub;
      document.getElementById('updateActionBtn').textContent = btnLabel;
      document.getElementById('updateProgressWrap').style.display = showProgress ? 'block' : 'none';
      if (toast) toast.style.display = 'block';
      if (dot)   dot.style.display   = 'block';
    }

    function hideUpdateToast() {
      _updLog('info', 'hideUpdateToast called');
      const t = document.getElementById('updateToast');
      if (t) t.style.display = 'none';
    }

    function updText(key, fallback) {
      if (window._t) {
        const value = window._t(key);
        if (typeof value === 'string') return value;
      }
      return fallback;
    }

    function updTextFn(key, fallback, value) {
      if (window._t) {
        const fn = window._t(key);
        if (typeof fn === 'function') return fn(value);
        if (typeof fn === 'string') return fn;
      }
      return fallback;
    }

    function _setUpdBtn(loading) {
      const btn = document.getElementById('sv3-update-btn');
      const lbl = document.getElementById('sv3-update-btn-label');
      if (!btn) return;
      btn.style.opacity  = loading ? '0.6' : '1';
      btn.style.cursor   = loading ? 'wait' : 'pointer';
      btn.disabled       = loading;
      btn.title          = loading ? updText('update.btn_title_checking', 'Checking for updates...') : updText('update.btn_title_check', 'Check for updates');
      if (lbl) lbl.textContent = loading ? updText('setup.checking_updates', 'Checking...') : updText('setup.check_updates_btn', 'Check for Updates');
    }

    function handleUpdateAction() {
      _updLog('info', `handleUpdateAction called, state=${_updateState}`);
      if (_updateState === 'available') {
        _updLog('info', 'Starting update download…');
        _updateState = 'downloading';
        document.getElementById('updateActionBtn').textContent = updText('update.downloading_action', 'Downloading...');
        document.getElementById('updateActionBtn').disabled = true;
        document.getElementById('updateProgressWrap').style.display = 'block';
        window.api.downloadUpdate();
      } else if (_updateState === 'downloaded') {
        _updLog('info', 'Requesting install & restart…');
        window.api.installUpdate();
      } else {
        _updLog('warn', `handleUpdateAction called in unexpected state: ${_updateState}`);
      }
    }

    function checkForUpdatesManual() {
      _updLog('info', `checkForUpdatesManual called, state=${_updateState}`);
      if (_updateState === 'available' || _updateState === 'downloaded') {
        _updLog('info', 'Update already found — re-showing toast');
        document.getElementById('updateToast').style.display = 'block';
        return;
      }
      if (_updateState === 'checking' || _updateState === 'downloading') {
        _updLog('info', `Already in progress (state=${_updateState}), ignoring click`);
        return;
      }

      _updateState = 'checking';
      _setUpdBtn(true);
      _updLog('info', 'Calling api.checkForUpdates…');

      window.api.checkForUpdates()
        .then(res => {
          _updLog('info', 'checkForUpdates resolved:', JSON.stringify(res));
          _setUpdBtn(false);
          if (res && res.dev) {
            _updLog('warn', 'Running in dev/unpackaged mode — auto-update skipped');
            _updateState = 'idle';
            document.getElementById('updateTitle').textContent = updText('update.dev_title', 'Dev Mode');
            document.getElementById('updateSub').textContent = updText('update.dev_sub', 'Auto-update only works in packaged app.');
            document.getElementById('updateActionBtn').textContent = updText('update.ok', 'OK');
            document.getElementById('updateActionBtn').onclick = hideUpdateToast;
            document.getElementById('updateProgressWrap').style.display = 'none';
            document.getElementById('updateToast').style.display = 'block';
            return;
          }
          if (res && res.ok === false) {
            _updLog('error', 'checkForUpdates returned error from main:', res.error);
            _updateState = 'error';
            document.getElementById('updateTitle').textContent = updText('update.check_failed_title', 'Update Check Failed');
            document.getElementById('updateSub').textContent = res.error || updText('update.unknown_error', 'Unknown error');
            document.getElementById('updateActionBtn').textContent = updText('update.dismiss', 'Dismiss');
            document.getElementById('updateActionBtn').disabled = false;
            document.getElementById('updateActionBtn').onclick = () => { _updateState = 'idle'; hideUpdateToast(); };
            document.getElementById('updateProgressWrap').style.display = 'none';
            document.getElementById('updateToast').style.display = 'block';
          }
          // If ok===true, the autoUpdater events (onUpdateAvailable / onUpdateNotAvailable) fire next
        })
        .catch(err => {
          _updLog('error', 'checkForUpdates IPC threw:', err);
          _setUpdBtn(false);
          _updateState = 'error';
          document.getElementById('updateTitle').textContent = updText('update.check_failed_title', 'Update Check Failed');
          document.getElementById('updateSub').textContent = err.message || String(err);
          document.getElementById('updateActionBtn').textContent = updText('update.dismiss', 'Dismiss');
          document.getElementById('updateActionBtn').disabled = false;
          document.getElementById('updateActionBtn').onclick = () => { _updateState = 'idle'; hideUpdateToast(); };
          document.getElementById('updateProgressWrap').style.display = 'none';
          document.getElementById('updateToast').style.display = 'block';
        });
    }

    function initAutoUpdater() {
      _updLog('info', 'initAutoUpdater — wiring up IPC events');
      if (!window.api || !window.api.onUpdateAvailable) {
        _updLog('warn', 'window.api.onUpdateAvailable not found — preload may not have loaded correctly');
        return;
      }

      window.api.onUpdateAvailable(({ version }) => {
        _updLog('info', `onUpdateAvailable fired — version=${version}`);
        _updateState = 'available';
        _setUpdBtn(false);
        document.getElementById('updateTitle').textContent = updTextFn('update.available_title', 'Update v' + version + ' Available', version);
        document.getElementById('updateSub').textContent   = updText('update.available_sub', 'A new version is ready to download.');
        document.getElementById('updateActionBtn').textContent = updText('update.download_update', 'Download Update');
        document.getElementById('updateActionBtn').disabled = false;
        document.getElementById('updateActionBtn').onclick = handleUpdateAction;
        document.getElementById('updateProgressWrap').style.display = 'none';
        document.getElementById('updateToast').style.display = 'block';
        const dot = document.getElementById('updateDot');
        if (dot) dot.style.display = 'block';
      });

      window.api.onUpdateNotAvailable(() => {
        _updLog('info', `onUpdateNotAvailable fired — state was ${_updateState}`);
        _setUpdBtn(false);
        if (_updateState === 'checking') {
          _updateState = 'idle';
          document.getElementById('updateTitle').textContent = updText('update.up_to_date_title', "You're up to date");
          document.getElementById('updateSub').textContent = updText('update.up_to_date_sub', 'No new version found.');
          document.getElementById('updateActionBtn').textContent = updText('update.ok', 'OK');
          document.getElementById('updateActionBtn').onclick = hideUpdateToast;
          document.getElementById('updateProgressWrap').style.display = 'none';
          document.getElementById('updateToast').style.display = 'block';
        } else {
          _updateState = 'idle';
        }
      });

      window.api.onUpdateProgress(({ percent }) => {
        _updLog('info', `onUpdateProgress — ${percent}%`);
        const bar = document.getElementById('updateProgressBar');
        const lbl = document.getElementById('updateProgressLabel');
        if (bar) bar.style.width = percent + '%';
        if (lbl) lbl.textContent = percent + '%';
        document.getElementById('updateTitle').textContent = updText('update.downloading_title', 'Downloading Update...');
        document.getElementById('updateSub').textContent   = updTextFn('update.download_progress', percent + '% complete', percent);
        document.getElementById('updateProgressWrap').style.display = 'block';
      });

      window.api.onUpdateDownloaded(() => {
        _updLog('info', 'onUpdateDownloaded fired — update ready to install');
        _updateState = 'downloaded';
        document.getElementById('updateProgressWrap').style.display = 'none';
        document.getElementById('updateTitle').textContent = updText('update.ready_title', 'Update Ready to Install');
        document.getElementById('updateSub').textContent   = updText('update.ready_sub', 'Restart the app to apply the update.');
        document.getElementById('updateActionBtn').textContent = updText('update.restart_install', 'Restart & Install');
        document.getElementById('updateActionBtn').disabled = false;
        document.getElementById('updateActionBtn').onclick = handleUpdateAction;
        document.getElementById('updateToast').style.display = 'block';
      });

      window.api.onUpdateError(({ message }) => {
        _updLog('error', `onUpdateError fired — message: ${message}`);
        _updateState = 'error';
        _setUpdBtn(false);
        document.getElementById('updateTitle').textContent = updText('update.error_title', 'Update Error');
        document.getElementById('updateSub').textContent = message || updText('update.error_sub', 'An unknown error occurred during update.');
        document.getElementById('updateActionBtn').textContent = updText('update.dismiss', 'Dismiss');
        document.getElementById('updateActionBtn').disabled = false;
        document.getElementById('updateActionBtn').onclick = () => { _updateState = 'idle'; hideUpdateToast(); };
        document.getElementById('updateProgressWrap').style.display = 'none';
        document.getElementById('updateToast').style.display = 'block';
        const dot = document.getElementById('updateDot');
        if (dot) dot.style.display = 'none';
      });

      _updLog('info', 'initAutoUpdater — all events wired successfully');
    }

    // Call initAutoUpdater after DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initAutoUpdater);
    } else {
      initAutoUpdater();
    }
    </script>
  </body>
</html>
